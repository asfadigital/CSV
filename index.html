const HEADERS = RAW.headers;
const DATA = RAW.data;

const COL = {};
HEADERS.forEach((h,i) => COL[h] = i);

DATA.forEach(r => {
  const u = (r[COL['Tipo LV']]||'').trim().toUpperCase();
  if (u === 'TEMPORAL') r[COL['Tipo LV']] = 'Temporal';
  else if (u === 'FIJA') r[COL['Tipo LV']] = 'Fija';
});

let sortCol = -1, sortDir = 1;
let filtered = [...DATA];
let zoomLevel = 100;

// ── Zoom ─────────────────────────────────────────────────────────────────────
const BASE_PX = 12;
function changeZoom(delta) {
  zoomLevel = Math.min(Math.max(zoomLevel + delta, 60), 160);
  document.getElementById('tableWrap').style.fontSize = Math.round(BASE_PX * zoomLevel / 100) + 'px';
  document.getElementById('zoomPct').textContent = zoomLevel + '%';
}

// ── Filters ───────────────────────────────────────────────────────────────────
function norm(v) { return (v||'').trim().toLowerCase(); }

function getActiveFilters() {
  return {
    linea:  document.getElementById('fLinea').value,
    tipo:   document.getElementById('fTipo').value,
    modo:   document.getElementById('fModo').value,
    search: norm(document.getElementById('searchInput').value)
  };
}

function rowMatches(r, f, skip) {
  if (skip !== 'linea' && f.linea && r[COL['L\u00ednea']]    !== f.linea) return false;
  if (skip !== 'tipo'  && f.tipo  && r[COL['Tipo LV']]  !== f.tipo)  return false;
  if (skip !== 'modo'  && f.modo  && r[COL['Modo ASFA']] !== f.modo) return false;
  if (f.search && !r.some(v => norm(v).includes(f.search)))          return false;
  return true;
}

function rebuildSelect(selId, colIdx, currentVal, rows, numericSort) {
  const sel = document.getElementById(selId);
  const vals = [...new Set(rows.map(r => r[colIdx]))].filter(Boolean).sort((a,b) => {
    if (numericSort) {
      const na = parseFloat(a), nb = parseFloat(b);
      if (!isNaN(na) && !isNaN(nb)) return na - nb;
    }
    return a.localeCompare(b, 'es');
  });
  const keep = vals.includes(currentVal) ? currentVal : '';
  sel.innerHTML = '<option value="">\u2014 Todos \u2014</option>';
  vals.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    if (v === keep) o.selected = true;
    sel.appendChild(o);
  });
}

function updateAllFilters() {
  const f = getActiveFilters();
  rebuildSelect('fLinea', COL['L\u00ednea'],    f.linea, DATA.filter(r => rowMatches(r, f, 'linea')), true);
  rebuildSelect('fTipo',  COL['Tipo LV'],  f.tipo,  DATA.filter(r => rowMatches(r, f, 'tipo')),  false);
  rebuildSelect('fModo',  COL['Modo ASFA'],f.modo,  DATA.filter(r => rowMatches(r, f, 'modo')),  false);
}

function hasFilters() {
  return document.getElementById('fLinea').value  !== '' ||
         document.getElementById('fTipo').value   !== '' ||
         document.getElementById('fModo').value   !== '' ||
         document.getElementById('searchInput').value.trim() !== '';
}

function updateResetBtn() {
  document.getElementById('btnReset').disabled = !hasFilters();
}

function applyFilters() {
  updateAllFilters();
  const f = getActiveFilters();
  filtered = DATA.filter(r => rowMatches(r, f, null));
  if (sortCol >= 0) doSort();
  renderTable();
  updateResetBtn();
}

// ── Sort ──────────────────────────────────────────────────────────────────────
function sortBy(col, th) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted-asc','sorted-desc'));
  th.classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
  doSort(); renderTable();
}

function doSort() {
  filtered.sort((a,b) => {
    const va = a[sortCol], vb = b[sortCol];
    const na = parseFloat(va), nb = parseFloat(vb);
    if (!isNaN(na) && !isNaN(nb)) return (na - nb) * sortDir;
    return (va||'').localeCompare(vb||'', 'es') * sortDir;
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function badgeTipo(v) {
  const l = (v||'').toLowerCase();
  if (l === 'temporal') return '<span class="badge badge-temporal">Temporal</span>';
  if (l === 'fija')     return '<span class="badge badge-fija">Fija</span>';
  return v;
}
function badgeModo(v) {
  if (!v) return '';
  switch(v.toUpperCase()) {
    case 'CONV': return '<span class="badge badge-conv">CONV</span>';
    case 'AV':   return '<span class="badge badge-av">AV</span>';
    case 'RAM':  return '<span class="badge badge-ram">RAM</span>';
    default:     return v;
  }
}

function buildHeader() {
  const tr = document.getElementById('headerRow');
  HEADERS.forEach((h, i) => {
    const th = document.createElement('th');
    th.innerHTML = h + '<span class="sort-icon"></span>';
    th.dataset.col = i;
    th.onclick = () => sortBy(i, th);
    if (h === 'Descripci\u00f3n L\u00ednea') th.classList.add('col-desc');
    tr.appendChild(th);
  });
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const noRes = document.getElementById('noResults');
  if (filtered.length === 0) {
    tbody.innerHTML = '';
    noRes.style.display = '';
  } else {
    noRes.style.display = 'none';
    tbody.innerHTML = filtered.map(r => {
      const cells = r.map((v, i) => {
        const h = HEADERS[i];
        if (h === 'Tipo LV')   return '<td>' + badgeTipo(v) + '</td>';
        if (h === 'Modo ASFA') return '<td>' + badgeModo(v) + '</td>';
        if (h === 'Descripci\u00f3n L\u00ednea') return '<td class="wrap">' + v + '</td>';
        if (h === 'Motivo')    return '<td class="wrap-motivo">' + v + '</td>';
        return '<td>' + v + '</td>';
      }).join('');
      return '<tr>' + cells + '</tr>';
    }).join('');
  }
  document.getElementById('countShown').textContent = filtered.length.toLocaleString('es');
  document.getElementById('countTotal').textContent  = DATA.length.toLocaleString('es');
}

function resetFilters() {
  ['fLinea','fTipo','fModo'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('searchInput').value = '';
  sortCol = -1; sortDir = 1;
  document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted-asc','sorted-desc'));
  applyFilters();
}

function exportCSV() {
  const BOM = '\uFEFF';
  const esc = v => '"' + (v||'').replace(/"/g,'""') + '"';
  const lines = [HEADERS.map(esc).join(';')];
  filtered.forEach(r => lines.push(r.map(esc).join(';')));
  const blob = new Blob([BOM + lines.join('\n')], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'CSV_RFIG_filtrado.csv';
  a.click();
}

buildHeader();
['fLinea','fTipo','fModo'].forEach(id =>
  document.getElementById(id).addEventListener('change', applyFilters));
document.getElementById('searchInput').addEventListener('input', applyFilters);
applyFilters();
</script>
